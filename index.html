<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro | Personal Task Manager with Login</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%233f51b5'/%3E%3Cpath d='M30 52 L43 65 L70 35' stroke='%23ffffff' stroke-width='12' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 48px 24px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Login/Register Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal h2 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .modal p {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 24px;
        }

        .modal input, .modal select {
            width: 100%;
            padding: 14px 16px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            font-size: 0.9rem;
            color: white;
            margin-bottom: 16px;
            font-family: 'Inter', sans-serif;
        }

        .modal input:focus, .modal select:focus {
            outline: none;
            border-color: #6366f1;
        }

        .modal button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 16px;
        }

        .switch-auth {
            text-align: center;
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .switch-auth a {
            color: #a5b4fc;
            cursor: pointer;
            text-decoration: none;
        }

        /* Header Section */
        .header-section {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-left .badge {
            display: inline-block;
            background: rgba(99, 102, 241, 0.2);
            backdrop-filter: blur(10px);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #a5b4fc;
            margin-bottom: 12px;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .header-left h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 50%, #c4b5fd 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px solid rgba(71, 85, 105, 0.4);
        }

        .user-info {
            text-align: right;
        }

        .user-info .name {
            font-weight: 600;
            color: white;
        }

        .user-info .designation {
            font-size: 0.7rem;
            color: #94a3b8;
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.2);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: #f87171;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.4);
        }

        /* Dashboard Layout */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px;
        }

        /* Left Panel */
        .user-panel {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(71, 85, 105, 0.4);
            overflow: hidden;
            height: fit-content;
            position: sticky;
            top: 24px;
        }

        .user-profile {
            padding: 32px;
            text-align: center;
            border-bottom: 1px solid rgba(71, 85, 105, 0.3);
            background: rgba(15, 23, 42, 0.5);
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 3rem;
            font-weight: 600;
            color: white;
            border: 3px solid rgba(255,255,255,0.2);
        }

        .user-name-display {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }

        .user-designation-display {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 16px;
        }

        .user-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 16px;
        }

        .user-stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #a5b4fc;
        }

        .user-stat-label {
            font-size: 0.7rem;
            color: #64748b;
        }

        .progress-section {
            padding: 24px;
            border-bottom: 1px solid rgba(71, 85, 105, 0.3);
        }

        .progress-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .progress-title i {
            font-size: 1.1rem;
            color: #8b5cf6;
        }

        .progress-title span {
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .progress-bar-container {
            background: #1e293b;
            border-radius: 12px;
            height: 12px;
            overflow: hidden;
            margin: 12px 0;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            border-radius: 12px;
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
        }

        .streak-card {
            background: rgba(99, 102, 241, 0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-top: 16px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .streak-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #fbbf24;
        }

        .insights-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .insight-card {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }

        .insight-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #a5b4fc;
        }

        .insight-label {
            font-size: 0.65rem;
            color: #64748b;
            margin-top: 4px;
        }

        /* Main Task Area */
        .main-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(71, 85, 105, 0.4);
            overflow: hidden;
        }

        .add-task-section {
            padding: 32px;
            background: rgba(15, 23, 42, 0.5);
            border-bottom: 1px solid rgba(71, 85, 105, 0.3);
        }

        .add-task-form {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .task-input-group {
            flex: 2;
            min-width: 200px;
            position: relative;
        }

        .task-input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
        }

        .task-input-group input, .select-wrapper select {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            font-size: 0.9rem;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .select-wrapper {
            position: relative;
            flex: 1;
            min-width: 130px;
        }

        .select-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
            z-index: 1;
        }

        .select-wrapper select {
            appearance: none;
            cursor: pointer;
        }

        .add-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            padding: 0 32px;
            border-radius: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-bar {
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            border-bottom: 1px solid rgba(71, 85, 105, 0.3);
        }

        .filter-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 20px;
            background: transparent;
            border: 1px solid #334155;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #94a3b8;
            cursor: pointer;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-color: transparent;
            color: white;
        }

        .search-box {
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
        }

        .search-box input {
            padding: 10px 16px 10px 38px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 40px;
            width: 240px;
            color: white;
        }

        .task-list {
            padding: 20px 32px 32px;
            min-height: 450px;
            max-height: 500px;
            overflow-y: auto;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            background: rgba(30, 41, 59, 0.4);
            border-radius: 20px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .task-item:hover {
            background: rgba(30, 41, 59, 0.7);
            transform: translateX(4px);
        }

        .task-check {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #6366f1;
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-size: 1rem;
            font-weight: 500;
            color: #f1f5f9;
            margin-bottom: 8px;
        }

        .task-title.completed {
            text-decoration: line-through;
            color: #64748b;
        }

        .task-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .priority-badge {
            font-size: 0.65rem;
            padding: 4px 12px;
            border-radius: 100px;
            font-weight: 600;
        }

        .priority-high { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .priority-medium { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .priority-low { background: rgba(34, 197, 94, 0.2); color: #4ade80; }

        .category-badge {
            font-size: 0.65rem;
            padding: 4px 12px;
            border-radius: 100px;
            background: rgba(100, 116, 139, 0.3);
            color: #94a3b8;
        }

        .due-date {
            font-size: 0.7rem;
            color: #64748b;
        }

        .due-date.overdue { color: #f87171; }

        .delete-btn {
            background: rgba(239, 68, 68, 0.1);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            cursor: pointer;
            color: #f87171;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .footer {
            padding: 16px 32px;
            background: rgba(15, 23, 42, 0.5);
            border-top: 1px solid rgba(71, 85, 105, 0.3);
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #64748b;
        }

        .clear-completed {
            background: none;
            border: none;
            color: #f87171;
            cursor: pointer;
        }

        @media (max-width: 1100px) {
            .dashboard-layout { grid-template-columns: 1fr; }
            .user-panel { position: static; margin-bottom: 24px; }
            .header-section { flex-direction: column; text-align: center; }
            .add-task-form { flex-direction: column; }
            .add-btn { padding: 14px; justify-content: center; }
            .filter-bar { flex-direction: column; }
            .search-box input { width: 100%; }
        }
    </style>
</head>
<body>

<div id="app"></div>

<script>
    // ========== AUTH & STORAGE ==========
    let currentUser = null;
    let tasks = [];
    let currentFilter = 'all';
    let searchQuery = '';
    let currentStreak = 0;

    // Users database (stored in localStorage)
    let users = [];

    function loadUsers() {
        const saved = localStorage.getItem('taskflow_users');
        if (saved) {
            users = JSON.parse(saved);
        } else {
            // Default demo user
            users = [{
                id: 'user_1',
                email: 'rakesh@taskflow.com',
                password: '123456',
                name: 'Rakesh Roshan Paul',
                designation: 'SQA Engineer',
                avatar: '👨‍💻'
            }];
            localStorage.setItem('taskflow_users', JSON.stringify(users));
        }
    }

    function saveUsers() {
        localStorage.setItem('taskflow_users', JSON.stringify(users));
    }

    function loadUserTasks() {
        if (!currentUser) return;
        const saved = localStorage.getItem(`taskflow_tasks_${currentUser.id}`);
        if (saved) {
            tasks = JSON.parse(saved);
        } else {
            tasks = [];
        }
        loadUserStreak();
    }

    function saveUserTasks() {
        if (currentUser) {
            localStorage.setItem(`taskflow_tasks_${currentUser.id}`, JSON.stringify(tasks));
            saveUserStreak();
        }
    }

    function loadUserStreak() {
        const savedStreak = localStorage.getItem(`taskflow_streak_${currentUser.id}`);
        currentStreak = savedStreak ? parseInt(savedStreak) : 0;
    }

    function saveUserStreak() {
        if (currentUser) {
            localStorage.setItem(`taskflow_streak_${currentUser.id}`, currentStreak);
        }
    }

    function updateStreak() {
        const today = new Date().toISOString().split('T')[0];
        const lastActive = localStorage.getItem(`taskflow_last_active_${currentUser.id}`);
        const todayCompleted = tasks.filter(t => {
            if (!t.completed) return false;
            const completedDate = t.completedAt ? t.completedAt.split('T')[0] : t.updatedAt?.split('T')[0];
            return completedDate === today;
        }).length;

        if (todayCompleted > 0) {
            if (lastActive !== today) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStr = yesterday.toISOString().split('T')[0];
                if (lastActive === yesterdayStr) {
                    currentStreak++;
                } else if (!lastActive) {
                    currentStreak = 1;
                } else if (lastActive !== today) {
                    currentStreak = 1;
                }
                localStorage.setItem(`taskflow_last_active_${currentUser.id}`, today);
                saveUserStreak();
            }
        }
    }

    // ========== AUTH FUNCTIONS ==========
    function login(email, password) {
        const user = users.find(u => u.email === email && u.password === password);
        if (user) {
            currentUser = user;
            localStorage.setItem('taskflow_current_user', JSON.stringify(currentUser));
            loadUserTasks();
            updateStreak();
            renderApp();
            return true;
        }
        return false;
    }

    function register(name, email, password, designation) {
        if (users.find(u => u.email === email)) {
            return false;
        }
        const newUser = {
            id: 'user_' + Date.now(),
            email: email,
            password: password,
            name: name,
            designation: designation,
            avatar: getAvatarIcon(name)
        };
        users.push(newUser);
        saveUsers();
        return login(email, password);
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('taskflow_current_user');
        renderApp();
    }

    function getAvatarIcon(name) {
        const firstLetter = name.charAt(0).toUpperCase();
        return firstLetter;
    }

    function checkAutoLogin() {
        const saved = localStorage.getItem('taskflow_current_user');
        if (saved) {
            currentUser = JSON.parse(saved);
            loadUsers();
            const userExists = users.find(u => u.id === currentUser.id);
            if (userExists) {
                currentUser = userExists;
                loadUserTasks();
                updateStreak();
                renderApp();
                return true;
            } else {
                logout();
                return false;
            }
        }
        renderApp();
        return false;
    }

    // ========== TASK FUNCTIONS ==========
    function addTask(title, priority, category, dueDate) {
        tasks.unshift({
            id: Date.now(),
            title: title,
            priority: priority,
            category: category,
            dueDate: dueDate,
            completed: false,
            createdAt: new Date().toISOString()
        });
        saveUserTasks();
        renderApp();
    }

    function toggleTask(id) {
        const task = tasks.find(t => t.id === id);
        if (task) {
            task.completed = !task.completed;
            task.updatedAt = new Date().toISOString();
            if (task.completed) task.completedAt = new Date().toISOString();
            saveUserTasks();
            updateStreak();
            renderApp();
        }
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        saveUserTasks();
        renderApp();
    }

    function clearCompleted() {
        tasks = tasks.filter(t => !t.completed);
        saveUserTasks();
        renderApp();
    }

    function isOverdue(task) {
        if (task.completed) return false;
        if (!task.dueDate) return false;
        const today = new Date().toISOString().split('T')[0];
        return task.dueDate < today;
    }

    function formatDate(dateString) {
        if (!dateString) return 'No date';
        const today = new Date().toISOString().split('T')[0];
        if (dateString === today) return 'Today';
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        if (dateString === tomorrow.toISOString().split('T')[0]) return 'Tomorrow';
        return new Date(dateString).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function getFilteredTasks() {
        let filtered = [...tasks];
        if (currentFilter === 'active') filtered = filtered.filter(t => !t.completed);
        else if (currentFilter === 'completed') filtered = filtered.filter(t => t.completed);
        else if (currentFilter === 'overdue') filtered = filtered.filter(t => isOverdue(t));
        if (searchQuery) {
            filtered = filtered.filter(t => t.title.toLowerCase().includes(searchQuery.toLowerCase()));
        }
        filtered.sort((a, b) => {
            if (isOverdue(a) && !isOverdue(b)) return -1;
            if (!isOverdue(a) && isOverdue(b)) return 1;
            if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
            const priorityOrder = { high: 0, medium: 1, low: 2 };
            return priorityOrder[a.priority] - priorityOrder[b.priority];
        });
        return filtered;
    }

    // ========== RENDER FUNCTIONS ==========
    function renderLoginModal() {
        let showLogin = true;
        
        const modalHtml = `
            <div class="modal-overlay" id="authModal">
                <div class="modal">
                    <div id="authFormContainer">
                        <h2 id="authTitle">Welcome Back</h2>
                        <p id="authSubtitle">Login to continue to TaskFlow Pro</p>
                        
                        <div id="loginForm">
                            <input type="email" id="loginEmail" placeholder="Email address" autocomplete="off">
                            <input type="password" id="loginPassword" placeholder="Password">
                            <button id="loginBtn">Login →</button>
                        </div>
                        
                        <div class="switch-auth">
                            Don't have an account? <a id="switchToRegister">Create account</a>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('app').innerHTML = modalHtml;
        
        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (login(email, password)) {
                document.getElementById('authModal').remove();
                renderApp();
            } else {
                alert('Invalid email or password');
            }
        });
        
        document.getElementById('switchToRegister').addEventListener('click', () => {
            renderRegisterModal();
        });
        
        document.getElementById('loginEmail').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
        document.getElementById('loginPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
    }

    function renderRegisterModal() {
        const modalHtml = `
            <div class="modal-overlay" id="authModal">
                <div class="modal">
                    <div id="authFormContainer">
                        <h2 id="authTitle">Create Account</h2>
                        <p id="authSubtitle">Start your productivity journey</p>
                        
                        <div id="registerForm">
                            <input type="text" id="regName" placeholder="Full name">
                            <input type="email" id="regEmail" placeholder="Email address">
                            <input type="text" id="regDesignation" placeholder="Designation (e.g., SQA Engineer)">
                            <input type="password" id="regPassword" placeholder="Password">
                            <button id="registerBtn">Create Account →</button>
                        </div>
                        
                        <div class="switch-auth">
                            Already have an account? <a id="switchToLogin">Login</a>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('app').innerHTML = modalHtml;
        
        document.getElementById('registerBtn').addEventListener('click', () => {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const designation = document.getElementById('regDesignation').value.trim();
            const password = document.getElementById('regPassword').value;
            
            if (!name || !email || !designation || !password) {
                alert('Please fill all fields');
                return;
            }
            
            if (register(name, email, password, designation)) {
                document.getElementById('authModal').remove();
                renderApp();
            } else {
                alert('Email already exists');
            }
        });
        
        document.getElementById('switchToLogin').addEventListener('click', () => {
            renderLoginModal();
        });
    }

    function renderApp() {
        if (!currentUser) {
            renderLoginModal();
            return;
        }
        
        const total = tasks.length;
        const completed = tasks.filter(t => t.completed).length;
        const pending = total - completed;
        const overdue = tasks.filter(t => isOverdue(t)).length;
        const highPriority = tasks.filter(t => t.priority === 'high' && !t.completed).length;
        const today = new Date().toISOString().split('T')[0];
        const completedToday = tasks.filter(t => {
            if (!t.completed) return false;
            const completedDate = t.completedAt ? t.completedAt.split('T')[0] : t.updatedAt?.split('T')[0];
            return completedDate === today;
        }).length;
        const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);
        
        // Category breakdown
        const categories = ['Work', 'Personal', 'Learning', 'Health', 'Other'];
        const categoryHtml = categories.map(cat => {
            const totalCat = tasks.filter(t => t.category === cat).length;
            const completedCat = tasks.filter(t => t.category === cat && t.completed).length;
            const percent = totalCat === 0 ? 0 : Math.round((completedCat / totalCat) * 100);
            return `
                <div style="margin-bottom: 16px;">
                    <div style="display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 6px;">
                        <span>${cat}</span>
                        <span>${completedCat}/${totalCat}</span>
                    </div>
                    <div class="progress-bar-container" style="height: 6px;">
                        <div class="progress-bar-fill" style="width: ${percent}%;"></div>
                    </div>
                </div>
            `;
        }).join('');
        
        // Filtered tasks for list
        const filtered = getFilteredTasks();
        let tasksHtml = '';
        if (filtered.length === 0) {
            tasksHtml = '<div class="empty-state">✨ No tasks found</div>';
        } else {
            tasksHtml = filtered.map(task => {
                const priorityClass = task.priority === 'high' ? 'priority-high' : (task.priority === 'medium' ? 'priority-medium' : 'priority-low');
                const priorityIcon = task.priority === 'high' ? '🔥' : (task.priority === 'medium' ? '⚡' : '🍃');
                return `
                    <div class="task-item" data-id="${task.id}">
                        <input type="checkbox" class="task-check" ${task.completed ? 'checked' : ''}>
                        <div class="task-content">
                            <div class="task-title ${task.completed ? 'completed' : ''}">${escapeHtml(task.title)}</div>
                            <div class="task-meta">
                                <span class="priority-badge ${priorityClass}">${priorityIcon} ${task.priority}</span>
                                <span class="category-badge"><i class="fas fa-folder"></i> ${task.category}</span>
                                <span class="due-date ${isOverdue(task) ? 'overdue' : ''}"><i class="fas fa-calendar-alt"></i> ${formatDate(task.dueDate)} ${isOverdue(task) ? '(Overdue)' : ''}</span>
                            </div>
                        </div>
                        <button class="delete-btn" data-id="${task.id}"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            }).join('');
        }
        
        const appHtml = `
            <div class="app-container">
                <div class="header-section">
                    <div class="header-left">
                        <div class="badge"><i class="fas fa-chart-line"></i> Personal Productivity Dashboard</div>
                        <h1>TaskFlow <span style="background: linear-gradient(135deg, #a5b4fc, #c4b5fd); -webkit-background-clip: text; background-clip: text; color: transparent;">Pro</span></h1>
                    </div>
                    <div class="user-menu">
                        <div class="user-info">
                            <div class="name">${escapeHtml(currentUser.name)}</div>
                            <div class="designation">${escapeHtml(currentUser.designation)}</div>
                        </div>
                        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </div>
                </div>
                
                <div class="dashboard-layout">
                    <div class="user-panel">
                        <div class="user-profile">
                            <div class="avatar">${currentUser.avatar || '👤'}</div>
                            <div class="user-name-display">${escapeHtml(currentUser.name)}</div>
                            <div class="user-designation-display">${escapeHtml(currentUser.designation)}</div>
                            <div class="user-stats">
                                <div class="user-stat">
                                    <div class="user-stat-value">${total}</div>
                                    <div class="user-stat-label">Total Tasks</div>
                                </div>
                                <div class="user-stat">
                                    <div class="user-stat-value">${completed}</div>
                                    <div class="user-stat-label">Completed</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="progress-section">
                            <div class="progress-title"><i class="fas fa-chart-simple"></i><span>Overall Progress</span></div>
                            <div class="progress-bar-container"><div class="progress-bar-fill" style="width: ${percentage}%;"></div></div>
                            <div class="progress-stats"><span>${percentage}%</span><span>${completed}/${total} tasks done</span></div>
                        </div>
                        
                        <div class="progress-section">
                            <div class="progress-title"><i class="fas fa-fire"></i><span>Current Streak</span></div>
                            <div class="streak-card"><div class="streak-icon">🔥</div><div class="streak-number">${currentStreak}</div><div class="streak-label">Days in a row</div></div>
                        </div>
                        
                        <div class="progress-section">
                            <div class="progress-title"><i class="fas fa-chart-pie"></i><span>Category Breakdown</span></div>
                            ${categoryHtml || '<p style="color:#64748b;">No tasks yet</p>'}
                        </div>
                        
                        <div class="progress-section">
                            <div class="progress-title"><i class="fas fa-lightbulb"></i><span>Productivity Insights</span></div>
                            <div class="insights-grid">
                                <div class="insight-card"><div class="insight-value">${completedToday}</div><div class="insight-label">Completed Today</div></div>
                                <div class="insight-card"><div class="insight-value">${pending}</div><div class="insight-label">Pending Tasks</div></div>
                                <div class="insight-card"><div class="insight-value">${highPriority}</div><div class="insight-label">High Priority</div></div>
                                <div class="insight-card"><div class="insight-value">${overdue}</div><div class="insight-label">Overdue</div></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="main-card">
                        <div class="add-task-section">
                            <div class="add-task-form">
                                <div class="task-input-group"><i class="fas fa-tasks"></i><input type="text" id="newTaskTitle" placeholder="What needs to be done?"></div>
                                <div class="select-wrapper"><i class="fas fa-flag"></i><select id="newTaskPriority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select></div>
                                <div class="select-wrapper"><i class="fas fa-tag"></i><select id="newTaskCategory"><option value="Work">Work</option><option value="Personal">Personal</option><option value="Learning">Learning</option><option value="Health">Health</option><option value="Other">Other</option></select></div>
                                <div class="task-input-group"><i class="fas fa-calendar"></i><input type="date" id="newTaskDueDate"></div>
                                <button class="add-btn" id="addTaskBtn"><i class="fas fa-plus"></i> Add</button>
                            </div>
                        </div>
                        
                        <div class="filter-bar">
                            <div class="filter-buttons">
                                <button class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" data-filter="all">All</button>
                                <button class="filter-btn ${currentFilter === 'active' ? 'active' : ''}" data-filter="active">Active</button>
                                <button class="filter-btn ${currentFilter === 'completed' ? 'active' : ''}" data-filter="completed">Completed</button>
                                <button class="filter-btn ${currentFilter === 'overdue' ? 'active' : ''}" data-filter="overdue">Overdue</button>
                            </div>
                            <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search..."></div>
                        </div>
                        
                        <div class="task-list" id="taskList">${tasksHtml}</div>
                        
                        <div class="footer">
                            <span><i class="fas fa-database"></i> Auto-saved</span>
                            <button class="clear-completed" id="clearCompletedBtn"><i class="fas fa-trash-alt"></i> Clear completed</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('app').innerHTML = appHtml;
        
        // Set default date
        const todayDate = new Date().toISOString().split('T')[0];
        const dateInput = document.getElementById('newTaskDueDate');
        if (dateInput && !dateInput.value) dateInput.value = todayDate;
        
        // Add event listeners
        document.getElementById('addTaskBtn')?.addEventListener('click', () => {
            const title = document.getElementById('newTaskTitle').value.trim();
            if (!title) return alert('Enter a task');
            addTask(title, document.getElementById('newTaskPriority').value, document.getElementById('newTaskCategory').value, document.getElementById('newTaskDueDate').value);
            document.getElementById('newTaskTitle').value = '';
        });
        
        document.getElementById('clearCompletedBtn')?.addEventListener('click', () => clearCompleted());
        document.getElementById('logoutBtn')?.addEventListener('click', () => logout());
        document.getElementById('searchInput')?.addEventListener('input', (e) => { searchQuery = e.target.value; renderApp(); });
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => { currentFilter = btn.dataset.filter; renderApp(); });
        });
        
        document.querySelectorAll('.task-check').forEach(cb => {
            cb.addEventListener('change', (e) => toggleTask(parseInt(e.target.closest('.task-item').dataset.id)));
        });
        
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => deleteTask(parseInt(btn.dataset.id)));
        });
        
        document.getElementById('newTaskTitle')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('addTaskBtn').click();
        });
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Initialize
    loadUsers();
    checkAutoLogin();
</script>
</body>
</html>
